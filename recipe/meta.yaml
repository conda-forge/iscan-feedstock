{% set name = "iscan" %}
{% set version = "0.4.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 321504915e58b690231b2da14a000f73c0cd7a197a10fe1b4fce2489f556717c

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - iscan = iscan.scan:main

requirements:
  host:
    - python >=3.7
    - pip
  run:
    - python >=3.7

test:
  imports:
    - iscan
  requires:
    - pytest
    - pip
  commands:
    - iscan -h
    - pytest --pyargs iscan
    - pip check

about:
  home: https://github.com/zzhengnan/iscan
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: iscan helps you identify your project's dependencies

  description: |
    iscan helps you identify your project's dependencies
  doc_url: https://github.com/zzhengnan/iscan
  dev_url: https://github.com/zzhengnan/iscan

extra:
  recipe-maintainers:
    - zzhengnan
